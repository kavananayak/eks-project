apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 640129503214.dkr.ecr.us-east-1.amazonaws.com/eks-app:latest
        ports:
        - containerPort: 80
# update